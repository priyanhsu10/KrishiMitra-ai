spring:
  datasource:
    url: jdbc:h2:mem:krishimitra_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;NON_KEYWORDS=VALUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false   # DDL handled by Hibernate create-drop in tests

firebase:
  credentials:
    path: ""   # Firebase disabled in tests — NotificationService guards Optional<FirebaseMessaging>

jwt:
  secret: test_secret_key_for_unit_tests_only
  expiration: 86400000

ai:
  service:
    url: http://localhost:${wiremock.port:8089}

logging:
  level:
    com.krishimitra: DEBUG
