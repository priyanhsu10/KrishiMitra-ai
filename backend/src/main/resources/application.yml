spring:
  application:
    name: krishimitra-backend
  
  datasource:
    url: jdbc:postgresql://localhost:5432/krishimitra
    username: ${DB_USER:krishi}
    password: ${DB_PASS:krishi123}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  flyway:
    enabled: true
    url: jdbc:postgresql://localhost:5432/krishimitra   # explicit, avoids datasource misread
    user: ${DB_USER:krishi}
    password: ${DB_PASS:krishi123}
    baseline-on-migrate: true        # safe for existing DBs
    validate-on-migrate: true        # catches checksum mismatches early
    out-of-order: false              # enforce strict version ordering
    schemas: public
    locations: classpath:db/migration

server:
  port: 8080
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: ${JWT_SECRET:hackathon_secret_key_2025}
  expiration: 86400000  # 24 hours

ai:
  service:
    url: ${AI_SERVICE_URL:http://localhost:8000}

firebase:
  credentials:
    path: classpath:krishimitra-firebase-adminsdk.json

logging:
  level:
    com.krishimitra: DEBUG
    org.springframework.security: DEBUG
