spring:
  application:
    name: krishimitra-backend
  
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/krishimitra}
    username: ${DB_USER:krishi}
    password: ${DB_PASS:krishi123}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:hackathon_secret_key_2025}
  expiration: 86400000  # 24 hours

ai:
  service:
    url: ${AI_SERVICE_URL:http://localhost:8000}

firebase:
  credentials:
    path: ${FIREBASE_CREDENTIALS_PATH:classpath:krishimitra-firebase-adminsdk.json}

logging:
  level:
    com.krishimitra: DEBUG
    org.springframework.security: DEBUG
